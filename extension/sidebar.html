<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TermsGPT</title>
  <style>
    /* ---- Reset & base ---- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; color: #1a1a1a; background: #f9f9f9;
      height: 100vh; min-width: 360px; display: flex; flex-direction: column; overflow: hidden;
    }
    .hidden { display: none !important; }

    /* ---- Header ---- */
    header { padding: 14px 16px; background: #1a1a2e; color: #fff; flex-shrink: 0; }
    header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.4px; }
    header p  { font-size: 11px; opacity: 0.6; margin-top: 2px; }

    /* ---- Status bar (states a & b: extracting / analysing) ---- */
    #status-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 40px 16px; color: #555; font-size: 13px;
    }
    .spinner {
      width: 22px; height: 22px; border: 3px solid #e5e7eb;
      border-top-color: #1a1a2e; border-radius: 50%;
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Not-TC / error panels ---- */
    #state-not-tc, #state-error {
      padding: 20px 16px; font-size: 13px; line-height: 1.6; color: #555;
    }
    #state-error { background: #fff1f1; color: #991b1b; }

    /* ---- Main content wrapper ---- */
    #main-content {
      flex: 1; overflow: hidden; display: flex;
      flex-direction: column; min-height: 0;
    }

    /* ---- Risk dashboard ---- */
    #risk-dashboard { padding: 14px 16px 10px; flex-shrink: 0; overflow-y: auto; max-height: 50%; }
    #risk-dashboard h2, #chat-section h2 {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: #888; margin-bottom: 8px;
    }
    #risk-list { display: flex; flex-direction: column; gap: 6px; }
    .risk-item {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
      padding: 10px 12px; display: flex; gap: 10px;
    }
    .severity-badge { font-size: 16px; flex-shrink: 0; line-height: 1.4; }
    .risk-body { flex: 1; min-width: 0; }
    .risk-header {
      display: flex; justify-content: space-between;
      align-items: baseline; gap: 6px; margin-bottom: 3px;
    }
    .risk-category { font-weight: 600; font-size: 13px; }
    .view-clause {
      font-size: 11px; color: #1a1a2e; text-decoration: none;
      opacity: 0.6; white-space: nowrap; flex-shrink: 0;
    }
    .view-clause:hover { opacity: 1; text-decoration: underline; }
    .risk-finding { font-size: 12px; color: #555; line-height: 1.4; }
    .divider { border: none; border-top: 1px solid #e5e5e5; flex-shrink: 0; }

    /* ---- Chat section ---- */
    #chat-section {
      flex: 1; display: flex; flex-direction: column;
      min-height: 0; padding: 12px 16px 14px; gap: 10px;
    }
    #message-list {
      flex: 1; overflow-y: auto; display: flex;
      flex-direction: column; gap: 10px; min-height: 0;
    }
    .message { display: flex; }
    .message.user      { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .bubble {
      max-width: 88%; padding: 10px 12px; border-radius: 10px;
      font-size: 13px; line-height: 1.5; word-break: break-word;
    }
    .message.user .bubble {
      background: #1a1a2e; color: #fff; border-bottom-right-radius: 3px;
    }
    .message.assistant .bubble {
      background: #fff; border: 1px solid #e5e5e5; border-bottom-left-radius: 3px;
    }
    .bubble.thinking { color: #999; font-style: italic; }
    details.sources { margin-top: 8px; }
    details.sources summary {
      font-size: 11px; color: #888; cursor: pointer; user-select: none; list-style: none;
    }
    details.sources summary::before { content: "▶ "; font-size: 9px; }
    details[open].sources summary::before { content: "▼ "; font-size: 9px; }
    details.sources summary:hover { color: #555; }
    .citation-entry {
      margin-top: 6px; padding-left: 8px;
      border-left: 2px solid #e5e5e5; font-size: 11px; color: #666; line-height: 1.4;
    }
    .citation-entry strong { color: #333; display: block; margin-bottom: 2px; }

    /* ---- Query row (state c: answering handled in JS) ---- */
    .query-row { display: flex; gap: 6px; flex-shrink: 0; }
    #query-input {
      flex: 1; padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 13px; outline: none;
    }
    #query-input:focus { border-color: #1a1a2e; }
    #query-submit {
      padding: 8px 14px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 6px; font-size: 13px; cursor: pointer; flex-shrink: 0;
    }
    #query-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>TermsGPT</h1>
    <p>AI-powered Terms &amp; Conditions analyser</p>
  </header>

  <!-- Status bar — states (a) extracting and (b) analysing -->
  <div id="status-bar">
    <div class="spinner"></div>
    <span id="status-text">Extracting document…</span>
  </div>

  <!-- Not a T&C page -->
  <div id="state-not-tc" class="hidden">
    This page doesn't appear to be a Terms &amp; Conditions document.<br />
    <small>Navigate to a T&amp;C page and reopen the panel.</small>
  </div>

  <!-- Backend / network error -->
  <div id="state-error" class="hidden" id="error-message"></div>

  <!-- Ready: risk dashboard + chat -->
  <div id="main-content" class="hidden">
    <section id="risk-dashboard">
      <h2>Risk Report</h2>
      <div id="risk-list"></div>
    </section>

    <hr class="divider" />

    <section id="chat-section">
      <h2>Ask a Question</h2>
      <div id="message-list"></div>
      <div class="query-row">
        <input type="text" id="query-input" placeholder="e.g. Can they sell my data?" />
        <button id="query-submit">Ask</button>
      </div>
    </section>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
